<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>📝 Student Registration</h1>
                <p>Your handwritten details will be recorded in our system</p>
            </div>
            <form id="registerForm" onsubmit="return false;">
                <div class="input-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullName" required placeholder="Enter your full name">
                </div>
                <div class="input-group">
                    <label>Date of Birth *</label>
                    <input type="date" id="dob" required>
                </div>
                <div class="input-group">
                    <label>Email Address *</label>
                    <input type="email" id="email" required placeholder="student@gmail.com">
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="Your phone number">
                </div>
                <div class="input-group">
                    <label>Parent/Guardian Contact</label>
                    <input type="text" id="parentContact" placeholder="Parent's phone number">
                </div>
                <div class="input-group">
                    <label>Grade/Class *</label>
                    <select id="grade" required>
                        <option value="">Select Grade</option>
                        <option>Grade 1</option><option>Grade 2</option>
                        <option>Grade 3</option><option>Grade 4</option>
                        <option>Grade 5</option><option>Grade 6</option>
                        <option>Grade 7</option><option>Grade 8</option>
                        <option>Grade 9</option><option>Grade 10</option>
                        <option>Grade 11</option><option>Grade 12</option>
                    </select>
                </div>
                <button type="submit" class="btn">Register Now →</button>
            </form>
            <div id="debugInfo" style="margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 5px; font-size: 12px; display: none;">
                <strong>Debug Info:</strong><br>
                <span id="debugMessage"></span>
            </div>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login Here</a><br>
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
    // Wait for page to load
    document.addEventListener('DOMContentLoaded', function() {
        console.log('Page loaded, looking for form...');
        
        const registerForm = document.getElementById('registerForm');
        if (registerForm) {
            console.log('Form found, attaching event listener');
            
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log('Form submitted!');
                
                // Show debug info
                const debugDiv = document.getElementById('debugInfo');
                const debugMessage = document.getElementById('debugMessage');
                debugDiv.style.display = 'block';
                debugMessage.innerHTML = 'Processing registration...';
                
                // Get form values
                const fullName = document.getElementById('fullName').value;
                const dob = document.getElementById('dob').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;
                const parentContact = document.getElementById('parentContact').value;
                const grade = document.getElementById('grade').value;
                
                // Validate
                if (!fullName || !dob || !email || !grade) {
                    alert('Please fill in all required fields (*)');
                    debugMessage.innerHTML = 'Missing required fields';
                    return;
                }
                
                const formData = {
                    fullName: fullName,
                    dob: dob,
                    email: email,
                    phone: phone || '',
                    parentContact: parentContact || '',
                    grade: grade
                };
                
                console.log('Sending data:', formData);
                debugMessage.innerHTML = 'Sending to server...';
                
                try {
                    // Try multiple possible paths
                    let response = null;
                    let error = null;
                    
                    // Try the correct path first
                    const phpUrl = 'php/api/register.php';
                    console.log('Fetching from:', phpUrl);
                    
                    try {
                        response = await fetch(phpUrl, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Accept': 'application/json'
                            },
                            body: JSON.stringify(formData)
                        });
                        
                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                        }
                        
                        const result = await response.json();
                        console.log('Response:', result);
                        
                        if (result.success) {
                            alert(`✅ Registration Successful!\n\nYour Student ID is: ${result.studentId}\n\nPlease save this ID for login.`);
                            window.location.href = 'login.html';
                        } else {
                            alert('❌ Registration failed: ' + (result.message || 'Unknown error'));
                            debugMessage.innerHTML = 'Error: ' + (result.message || 'Unknown error');
                        }
                    } catch (fetchError) {
                        console.error('Fetch error:', fetchError);
                        debugMessage.innerHTML = 'Fetch error: ' + fetchError.message + '<br>Check if server is running';
                        alert('Cannot connect to server.\n\nPlease check:\n1. XAMPP is running\n2. Files are in htdocs/student-management-system/\n3. PHP files exist in php/api/ folder');
                    }
                    
                } catch (error) {
                    console.error('Registration error:', error);
                    debugMessage.innerHTML = 'Error: ' + error.message;
                    alert('Error: ' + error.message);
                }
            });
        } else {
            console.error('Form not found!');
        }
    });
    </script>
</body>
</html>
